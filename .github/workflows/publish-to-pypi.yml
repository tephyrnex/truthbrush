name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install Dependencies
        run: poetry install

      - name: Build package
        run: poetry build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  sync-citation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Sync CITATION.cff to release tag
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          date=$(date -u +%Y-%m-%d)
          sed -i "s/^version: .*/version: $version/" CITATION.cff
          sed -i "s/^date-released: .*/date-released: $date/" CITATION.cff
          if git diff --quiet CITATION.cff; then
            echo "CITATION.cff already in sync at $version / $date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git commit -m "Sync CITATION.cff to $GITHUB_REF_NAME"
          git push origin HEAD:main